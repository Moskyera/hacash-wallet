name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone fullnodedev dependency
        working-directory: ${{ github.workspace }}/..
        run: git clone --depth 1 https://github.com/hacash/fullnodedev.git hacash-fullnodedev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Test wallet-core (unit)
        run: cargo test -p hacash-wallet-core --lib

      - name: Security audit gates
        run: |
          cargo test -p hacash-wallet-core audit_ -- --test-threads=1
          cargo test -p hacash-wallet-core prop_

      - name: Tier-0 elite adversarial gates
        timeout-minutes: 20
        run: cargo test -p hacash-wallet-core audit_tier0_ -- --test-threads=1

      - name: Stress gates (Argon2-heavy; serial)
        timeout-minutes: 15
        run: cargo test -p hacash-wallet-core stress_ -- --test-threads=1

  desktop:
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4

      - name: Clone fullnodedev dependency
        working-directory: ${{ github.workspace }}/..
        run: git clone --depth 1 https://github.com/hacash/fullnodedev.git hacash-fullnodedev

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend deps
        run: yarn install --frozen-lockfile
        working-directory: apps/desktop

      - name: Build frontend
        run: yarn build
        working-directory: apps/desktop

      - name: Build Tauri (check compile)
        run: cargo build -p hacash-wallet