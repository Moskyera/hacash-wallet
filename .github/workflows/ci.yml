name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  NODE_VERSION: "22.17.0"
  YARN_VERSION: "1.22.22"
  ANDROID_NDK_VERSION: "27.2.12479018"

jobs:
  rust-quality:
    name: Rust format, lint and tests
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Verify synchronized release version
        run: node scripts/release-version.mjs check

      - name: Checkout pinned fullnodedev
        shell: pwsh
        run: ./scripts/checkout-fullnode.ps1

      - name: Activate pinned Rust toolchain
        run: |
          rustup show active-toolchain
          rustc --version --verbose
          cargo --version

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: wallet-rust-quality

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Lint complete Rust workspace
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Test complete Rust workspace
        run: cargo test --workspace --all-targets --all-features --locked -- --test-threads=1

  frontend:
    name: Frontend ${{ matrix.app }}
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        app: [desktop, mobile]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: apps/${{ matrix.app }}/yarn.lock

      - name: Install pinned Yarn
        run: npm install --global yarn@${YARN_VERSION}

      - name: Install dependencies
        working-directory: apps/${{ matrix.app }}
        run: yarn install --frozen-lockfile --non-interactive

      - name: Run mobile unit tests
        if: matrix.app == 'mobile'
        working-directory: apps/mobile
        run: yarn test

      - name: Type-check and build frontend
        working-directory: apps/${{ matrix.app }}
        run: yarn build

  desktop-compile:
    name: Desktop compile (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022, ubuntu-22.04]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Checkout pinned fullnodedev
        shell: pwsh
        run: ./scripts/checkout-fullnode.ps1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: apps/desktop/yarn.lock

      - name: Install pinned Yarn
        run: npm install --global yarn@${{ env.YARN_VERSION }}

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf libssl-dev

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: desktop-${{ runner.os }}

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: yarn install --frozen-lockfile --non-interactive

      - name: Compile desktop application without packaging
        working-directory: apps/desktop
        run: node node_modules/@tauri-apps/cli/tauri.js build --ci --no-bundle -- --locked

  android-compile:
    name: Android arm64 debug compile
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Checkout pinned fullnodedev
        shell: pwsh
        run: ./scripts/checkout-fullnode.ps1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: apps/mobile/yarn.lock

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Install pinned Android SDK and NDK
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;${ANDROID_NDK_VERSION}"
          rustup target add aarch64-linux-android
          echo "NDK_HOME=${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: android-arm64

      - name: Install pinned Yarn and dependencies
        working-directory: apps/mobile
        run: |
          npm install --global yarn@${YARN_VERSION}
          yarn install --frozen-lockfile --non-interactive

      - name: Initialize generated Android project
        working-directory: apps/mobile
        run: node node_modules/@tauri-apps/cli/tauri.js android init --ci

      - name: Fetch locked Rust dependencies
        run: cargo fetch --locked

      - name: Create ephemeral CI-only debug signer
        shell: bash
        run: |
          set -euo pipefail
          keytool -genkeypair -noprompt \
            -keystore "${RUNNER_TEMP}/ci-debug.jks" -storetype JKS \
            -alias ci-debug -storepass ci-debug-password -keypass ci-debug-password \
            -keyalg RSA -keysize 2048 -validity 2 \
            -dname "CN=CI Debug, O=Hacash Wallet"
          {
            printf 'password=ci-debug-password\n'
            printf 'keyAlias=ci-debug\n'
            printf 'storeFile=%s\n' "${RUNNER_TEMP}/ci-debug.jks"
          } > apps/mobile/src-tauri/gen/android/keystore.properties

      - name: Build the exact mobile frontend being packaged
        working-directory: apps/mobile
        run: yarn build

      - name: Apply and validate Android integration
        shell: pwsh
        run: ./apps/mobile/apply-android-patches.ps1

      - name: Build Android arm64 debug APK
        working-directory: apps/mobile
        run: node node_modules/@tauri-apps/cli/tauri.js android build --ci --debug --target aarch64 --apk -c tauri.android.build.conf.json -- --locked

      - name: Revalidate Android integration after Tauri regeneration
        shell: pwsh
        run: ./apps/mobile/validate-android-build.ps1

      - name: Verify debug APK version and ABI
        shell: bash
        run: |
          set -euo pipefail
          mapfile -d '' APKS < <(find apps/mobile/src-tauri/gen/android/app/build/outputs/apk -type f -iname '*debug*.apk' -print0)
          test "${#APKS[@]}" -eq 1
          APK="${APKS[0]}"
          test -s "$APK"
          VERSION="$(node -p "require('./apps/mobile/package.json').version")"
          IFS=. read -r VERSION_MAJOR VERSION_MINOR VERSION_PATCH <<< "$VERSION"
          VERSION_CODE=$((10#$VERSION_MAJOR * 10000 + 10#$VERSION_MINOR * 100 + 10#$VERSION_PATCH))
          BADGING="$("${ANDROID_HOME}/build-tools/36.0.0/aapt" dump badging "$APK")"
          grep -F "package: name='org.hacash.wallet.mobile'" <<< "$BADGING" | grep -F "versionName='${VERSION}'" | grep -F "versionCode='${VERSION_CODE}'"
          test "$(grep '^native-code:' <<< "$BADGING")" = "native-code: 'arm64-v8a'"
