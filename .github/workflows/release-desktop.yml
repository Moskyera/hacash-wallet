name: Release Desktop

on:
  workflow_dispatch:
  push:
    tags:
      - "v*-desktop"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone fullnodedev dependency (PQC branch)
        working-directory: ${{ github.workspace }}/..
        run: |
          git clone --depth 1 --branch feature/pqc-phases-1-3 \
            https://github.com/Moskyera/fullnodedev.git hacash-fullnodedev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf libssl-dev

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend deps
        run: yarn install --frozen-lockfile
        working-directory: apps/desktop

      - name: Build Tauri Linux release
        run: yarn tauri build
        working-directory: apps/desktop

      - name: Stage Linux artifacts
        run: |
          mkdir -p dist-release
          VER=$(node -p "require('./apps/desktop/src-tauri/tauri.conf.json').version")
          cp target/release/hacash-wallet "dist-release/hacash-wallet-desktop-v${VER}-x64-portable"
          chmod +x "dist-release/hacash-wallet-desktop-v${VER}-x64-portable"
          for f in target/release/bundle/deb/*.deb; do
            [ -f "$f" ] && cp "$f" "dist-release/hacash-wallet-desktop-v${VER}-x64.deb" && break
          done
          for f in target/release/bundle/appimage/*.AppImage; do
            [ -f "$f" ] && cp "$f" "dist-release/hacash-wallet-desktop-v${VER}-x64.AppImage" && break
          done
          ls -la dist-release/

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-linux-x64
          path: dist-release/*

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: desktop-linux-x64
          path: dist-release

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist-release/*
          append_body: true
          body: |
            ### Linux x64 (added by CI)
            - `hacash-wallet-desktop-v*-x64.deb` — Debian/Ubuntu
            - `hacash-wallet-desktop-v*-x64.AppImage` — universal Linux
            - `hacash-wallet-desktop-v*-x64-portable` — standalone binary