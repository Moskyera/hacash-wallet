name: Release Desktop

on:
  workflow_dispatch:
  push:
    tags:
      - "v*-desktop"

permissions:
  contents: read

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: false

env:
  CI: "true"
  NODE_VERSION: "22.17.0"
  YARN_VERSION: "1.22.22"

jobs:
  build-windows:
    name: Windows x64 installers and portable
    runs-on: windows-2022
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Verify release version and tag
        run: node scripts/release-version.mjs check

      - name: Checkout pinned fullnodedev
        shell: pwsh
        run: ./scripts/checkout-fullnode.ps1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: apps/desktop/yarn.lock

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: release-desktop-windows-x64

      - name: Install pinned frontend dependencies
        working-directory: apps/desktop
        run: |
          npm install --global yarn@${{ env.YARN_VERSION }}
          yarn install --frozen-lockfile --non-interactive

      - name: Build Windows x64 NSIS and MSI
        working-directory: apps/desktop
        run: node node_modules/@tauri-apps/cli/tauri.js build --ci --bundles nsis,msi -- --locked

      - name: Stage and validate exact Windows artifacts
        run: node scripts/release-artifacts.mjs stage-desktop windows dist-release

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: desktop-windows-x64
          path: dist-release/*
          if-no-files-found: error
          retention-days: 7

  build-linux:
    name: Linux x64 packages and binary
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Verify release version and tag
        run: node scripts/release-version.mjs check

      - name: Checkout pinned fullnodedev
        shell: pwsh
        run: ./scripts/checkout-fullnode.ps1

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf libssl-dev libfuse2 file

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: apps/desktop/yarn.lock

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: release-desktop-linux-x64

      - name: Install pinned frontend dependencies
        working-directory: apps/desktop
        run: |
          npm install --global yarn@${YARN_VERSION}
          yarn install --frozen-lockfile --non-interactive

      - name: Build Linux x64 deb and AppImage
        working-directory: apps/desktop
        run: node node_modules/@tauri-apps/cli/tauri.js build --ci --bundles deb,appimage -- --locked

      - name: Stage and validate exact Linux artifacts
        run: |
          node scripts/release-artifacts.mjs stage-desktop linux dist-release
          test "$(dpkg-deb -f dist-release/hacash-wallet-desktop-v*-x64.deb Architecture)" = "amd64"
          file dist-release/hacash-wallet-desktop-v*-x64.AppImage | grep -F "x86-64"
          file dist-release/hacash-wallet-desktop-v*-x64-binary | grep -F "x86-64"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: desktop-linux-x64
          path: dist-release/*
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish complete desktop release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-windows, build-linux]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Verify release version and tag
        run: node scripts/release-version.mjs check

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: desktop-*-x64
          path: dist-release
          merge-multiple: true

      - name: Verify complete release and generate checksums
        run: node scripts/release-artifacts.mjs verify-desktop dist-release

      - name: Publish only the verified complete artifact set
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: true
          files: dist-release/*
          body: |
            ### Hacash Wallet Desktop ${{ github.ref_name }}

            Windows x64:
            - NSIS setup executable
            - MSI installer
            - Portable executable

            Linux x64:
            - Debian package
            - AppImage
            - AppImage is the portable Linux option
            - Raw x64 binary (requires compatible GTK 3, WebKitGTK 4.1 and system libraries)

            A SHA-256 checksum file is included with all desktop artifacts.
